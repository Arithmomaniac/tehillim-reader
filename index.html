<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קורא תהילים — Tehillim Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙️</button>
      <h1 id="chapter-title">תהילים</h1>
      <button id="chapter-select-btn" class="icon-btn" aria-label="Select chapter">📖</button>
    </header>

    <main id="reading-area" tabindex="0">
      <div id="text-container"></div>
    </main>

    <footer id="nav-footer">
      <button id="prev-chapter" aria-label="Previous chapter">פרק הבא ►</button>
      <button id="next-chapter" aria-label="Next chapter">◄ פרק הקודם</button>
    </footer>
  </div>

  <!-- Settings Panel -->
  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-panel" class="panel">
      <div class="panel-header">
        <h2>הגדרות</h2>
        <button id="settings-close" class="icon-btn" aria-label="Close settings">✕</button>
      </div>
      <div class="panel-body">
        <div class="setting-group">
          <label>מצב הדגשה</label>
          <div class="toggle-group">
            <button id="mode-word" class="toggle-btn active" data-mode="word">מילה</button>
            <button id="mode-syllable" class="toggle-btn" data-mode="syllable">הברה</button>
          </div>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="reading-mode" checked />
            מצב קריאה רגיל (הברות מאוחדות)
          </label>
          <div class="setting-hint">כבוי = חלוקת הברות טברנית מדויקת</div>
        </div>
        <div class="setting-group">
          <label>סימון קמץ קטן</label>
          <div class="toggle-group">
            <button id="kamatz-off" class="toggle-btn active" data-kamatz="off">כבוי</button>
            <button id="kamatz-tint" class="toggle-btn" data-kamatz="tint">צבע</button>
            <button id="kamatz-bold" class="toggle-btn" data-kamatz="bold">בולט</button>
            <button id="kamatz-dot" class="toggle-btn" data-kamatz="dot">נקודה</button>
          </div>
          <div class="setting-hint">הבדלה ויזואלית בין קמץ גדול (אָ) לקמץ קטן (אׇ)</div>
        </div>
        <div class="setting-group">
          <label for="highlight-color">צבע הדגשה</label>
          <input type="color" id="highlight-color" value="#FFD700" />
        </div>
        <div class="setting-group">
          <label for="font-size-slider">גודל גופן: <span id="font-size-value">36</span>px</label>
          <input type="range" id="font-size-slider" min="20" max="72" value="36" />
        </div>
        <div class="setting-group">
          <label>סדר פרקים</label>
          <div class="toggle-group">
            <button id="order-sequential" class="toggle-btn active" data-order="sequential">לפי סדר</button>
            <button id="order-random" class="toggle-btn" data-order="random">אקראי</button>
          </div>
        </div>
        <div class="setting-group">
          <label>ערכת נושא / Theme</label>
          <div class="toggle-group">
            <button id="theme-warm" class="toggle-btn active" data-theme="warm">חם</button>
            <button id="theme-light" class="toggle-btn" data-theme="light">בהיר</button>
            <button id="theme-dark" class="toggle-btn" data-theme="dark">כהה</button>
          </div>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="auto-advance" checked />
            עבור לפרק הבא בסיום
          </label>
        </div>
      </div>
      <div class="panel-footer">
        <a href="https://github.com/Arithmomaniac/tehillim-reader" target="_blank" rel="noopener" class="github-link">
          <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </div>

  <!-- Chapter Selector -->
  <div id="chapter-overlay" class="overlay hidden">
    <div id="chapter-panel" class="panel">
      <div class="panel-header">
        <h2>בחר פרק</h2>
        <button id="chapter-close" class="icon-btn" aria-label="Close chapter selector">✕</button>
      </div>
      <div class="panel-body">
        <div id="chapter-grid"></div>
        <button id="random-chapter" class="action-btn">🎲 פרק אקראי</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
